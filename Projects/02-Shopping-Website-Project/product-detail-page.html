<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail Page</title>
    <link rel='stylesheet' href='shopping-website-project.css'>
</head>
<body>
    <header>
        <h1>SNEAKERZONE</h1>
        <nav class="navigation-bar">
            <a href="#men">Men</a>
            <a href="#women">Women</a>
            <a href="#kids">Kids</a>
        </nav>
        <div class="search-bar">
            <input type="text" placeholder="Search for products...">
            🛒
        </div>
    </header>
    </div>
    <div class="main-product">
        <div class="product-images">
            <img src="https://ik.imagekit.io/d9mvewbju/Course/BigbinaryAcademy/shoe7-larger-b_dv1lRR_EA.jpg?updatedAt=1728893902496" alt="Air Jordan 1 Mid">
            <img src="https://ik.imagekit.io/d9mvewbju/Course/BigbinaryAcademy/shoe7-larger-a_Ux2ekfF45.jpg?updatedAt=1728893954940" alt="Air Jordan 1 Mid">
        </div>
        <div class="product-details"> 
            <h1>Action Hyper High Side View</h1>
            <p>Men's Shoe</p>
            <p>MRP ₹ 13,995</p>
            <div class="size-selection">
                <h2>Select Size</h2>
                <button>UK 10</button>
                <button>UK 10.5</button>
                <button>UK 6</button>
                <button>UK 11</button>
                <button>UK 9.5</button>
                <button>UK 11.5</button>
            </div>
            <br>
            <div class="action-buttons">
                <button id="bag">Add to Bag</button>
                <button id="favorite">Favorite ♥</button>
            </div>
        </div>
    </div>
</body>
</html>
